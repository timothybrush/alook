coverage:
  status:
    project:
      shared:
        target: 50%
        paths:
          - src/shared/**
      cli:
        target: 60%
        paths:
          - src/cli/**
      email-worker:
        target: 70%
        paths:
          - src/email-worker/**
      ws-do:
        target: 70%
        paths:
          - src/ws-do/**
      web:
        target: 30%
        paths:
          - src/web/**
    patch:
      default:
        target: 60%

ignore:
  - "src/web/src/components/home/**"
  - "src/web/scripts/**"
  # Playwright browser E2E — driven by `playwright test`, not vitest, so these
  # files never appear in coverage and shouldn't count against patch %.
  - "src/web/src/test/e2e-ui/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
