name: Publish App

on:
  push:
    branches: [main]
    paths: [src/app/package.json]

concurrency:
  group: publish-app
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @alook/app to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Detect version
        id: version
        run: |
          VERSION=$(node -p "require('./src/app/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          if npm view "@alook/app@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@alook/app@${{ steps.version.outputs.version }} already on npm — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.check.outputs.skip == 'false'

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for Trusted Publishers
        if: steps.check.outputs.skip == 'false'
        run: |
          npm install -g --prefix="$RUNNER_TEMP/npm-new" npm@latest
          echo "$RUNNER_TEMP/npm-new/bin" >> "$GITHUB_PATH"

      - run: pnpm install --frozen-lockfile
        if: steps.check.outputs.skip == 'false'

      - name: Build packages
        if: steps.check.outputs.skip == 'false'
        run: pnpm build --filter=@alook/shared --filter=@alook/web --filter=@alook/cli --filter=@alook/email-worker --filter=@alook/ws-do

      - name: Bundle app (pre-build workers)
        if: steps.check.outputs.skip == 'false'
        run: pnpm -C src/app run bundle

      - name: Build app CLI
        if: steps.check.outputs.skip == 'false'
        run: pnpm -C src/app run build

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.skip == 'false'
        working-directory: src/app
        run: npm publish --access public
