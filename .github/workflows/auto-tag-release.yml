name: Auto-Tag & Release

# Gated on the E2E UI workflow: only tags/releases after browser E2E passes on
# the release commit. `workflow_run` payloads have no `head_commit` on
# `github.event` directly — use `github.event.workflow_run.*` and pin the
# checkout to the commit that triggered E2E.
on:
  workflow_run:
    workflows: ["E2E UI"]
    types: [completed]

jobs:
  auto-tag-release:
    name: Tag & Release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_commit.message, 'release: v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from commit message
        id: version
        env:
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | grep -oP '^release: v\K[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?')
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message, skipping."
            exit 1
          fi
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected tag: $TAG"

      - name: Check if tag already exists
        id: check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate changelog with git-cliff
        if: steps.check.outputs.exists == 'false'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Get previous tag
        if: steps.check.outputs.exists == 'false'
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          echo "tag=${PREV:-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          FULL_CHANGELOG=""
          if [ -n "$PREV_TAG" ]; then
            FULL_CHANGELOG="

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi
          NOTES="${CHANGELOG}${FULL_CHANGELOG}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          {
            echo "url=$RELEASE_URL"
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: steps.check.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.tag }}
          BODY: ${{ steps.release.outputs.body }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          PAYLOAD=$(python3 -c "
          import json, os
          version = os.environ['VERSION']
          body = os.environ.get('BODY', '')[:4096] or 'No changelog available'
          release_url = os.environ['RELEASE_URL']
          desc = f'{body}\n\n[View Release]({release_url})'
          if len(desc) > 4096:
              desc = desc[:4093] + '...'
          payload = {
            'embeds': [{
              'title': f'\U0001f680 Alook {version} Released',
              'description': desc,
              'color': 3066993,
              'url': release_url,
              'footer': {'text': 'Alook CI/CD'},
            }]
          }
          print(json.dumps(payload))
          ")
          curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
